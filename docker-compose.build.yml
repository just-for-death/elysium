# ── Elysium — docker-compose.build.yml (build from source) ───────────────────
#
# Use this file to build images locally from source instead of pulling
# from Docker Hub. Useful for development or custom forks.
#
# Usage:
#   docker compose -f docker-compose.build.yml up -d --build
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main app (PWA + REST) ─────────────────────────────────────────────────
  elysium:
    build:
      context: .
      dockerfile: Dockerfile.build
      args:
        BUILDKIT_INLINE_CACHE: "1"
    image: elysium:local
    container_name: elysium
    restart: unless-stopped
    ports:
      - "${PORT:-7771}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SYNC_SERVER_URL=http://sync-server:3001
      # ── Web Push / VAPID (optional) ───────────────────────────────────────
      # Generate keys: docker run --rm node:20-alpine npx web-push generate-vapid-keys
      # - VAPID_PUBLIC_KEY=your_public_key_here
      # - VAPID_PRIVATE_KEY=your_private_key_here
      # - VAPID_EMAIL=mailto:you@example.com
      # - BROADCAST_SECRET=change_me_to_a_long_random_secret
      # ── HSTS (only if behind an HTTPS reverse proxy) ──────────────────────
      # - ENABLE_HSTS=true
    depends_on:
      sync-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - elysium-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Real-time sync server ─────────────────────────────────────────────────
  sync-server:
    build:
      context: ./sync-server
      dockerfile: Dockerfile
    image: elysium-sync:local
    container_name: elysium-sync
    restart: unless-stopped
    # Uncomment to debug directly:
    # ports:
    #   - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SYNC_TTL_MS=86400000
      - LOG_LEVEL=${SYNC_LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - elysium-net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  elysium-net:
    driver: bridge
