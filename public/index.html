<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />

    <!-- ── Viewport ─────────────────────────────────────────────────────── -->
    <!-- viewport-fit=cover lets content extend into the iPhone notch / Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── Color scheme ─────────────────────────────────────────────────── -->
    <!-- Tells browser which color schemes the app supports – avoids flash of wrong bg -->
    <meta name="color-scheme" content="dark light" />

    <!-- ── Primary meta ─────────────────────────────────────────────────── -->
    <meta name="description" content="Privacy-focused music player powered by the Invidious API. Listen without ads or tracking." />
    <meta name="application-name" content="Elysium" />
    <meta name="generator" content="Elysium PWA" />

    <!-- ── Theme color (Teal dark) ──────────────────────────────────────── -->
    <meta name="theme-color" content="#0a1214" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a1214" media="(prefers-color-scheme: light)" />

    <!-- ── Google Fonts: Plus Jakarta Sans ──────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet" />

    <!-- ── PWA manifest ─────────────────────────────────────────────────── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ═══════════════════════════════════════════════════════════════════
         ICONS – following the same pattern as proven PWA references.

         Firefox for iOS (WebKit-based) reads apple-touch-icon for the
         home-screen / PWA bookmark icon. It does NOT install true PWAs
         but it DOES show the apple-touch-icon when you "Add to Home Screen"
         via the Firefox share sheet.  The bare (no sizes) entry must come
         FIRST so older engines pick it up immediately.

         Firefox for Android reads the Web App Manifest icon list.
         The SVG entry (purpose: any) gives it a perfect vector icon.

         rel="shortcut icon" + favicon.ico is the universal Firefox fallback
         for tab favicons across all platforms.
    ═══════════════════════════════════════════════════════════════════════ -->

    <!-- ── Shortcut icon + ICO (Firefox tab favicon, universal fallback) ── -->
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- ── SVG favicon (Chrome, Edge, Firefox desktop – scales perfectly) ── -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />

    <!-- ── PNG favicons (sized fallbacks for browsers that skip SVG) ──── -->
    <link rel="icon" type="image/png" sizes="16x16"   href="%PUBLIC_URL%/favicons/ios/16.png" />
    <link rel="icon" type="image/png" sizes="32x32"   href="%PUBLIC_URL%/favicons/ios/32.png" />
    <link rel="icon" type="image/png" sizes="48x48"   href="%PUBLIC_URL%/favicons/android/android-launchericon-48-48.png" />
    <link rel="icon" type="image/png" sizes="96x96"   href="%PUBLIC_URL%/favicons/android/android-launchericon-96-96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="%PUBLIC_URL%/favicons/android/android-launchericon-192-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="%PUBLIC_URL%/favicons/android/android-launchericon-512-512.png" />

    <!-- ── Firefox pinned-tab mask icon ─────────────────────────────────── -->
    <link rel="mask-icon" href="%PUBLIC_URL%/favicon.svg" color="#4c7ef3" />

    <!-- ── Apple touch icons ─────────────────────────────────────────────
         Firefox for iOS uses these for "Add to Home Screen".
         The bare entry (no sizes) MUST come first – it's the universal pick.
         Safari/iOS picks the closest size >= required.
    ── -->
    <link rel="apple-touch-icon"                    href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="57x57"   href="%PUBLIC_URL%/favicons/ios/57.png" />
    <link rel="apple-touch-icon" sizes="60x60"   href="%PUBLIC_URL%/favicons/ios/60.png" />
    <link rel="apple-touch-icon" sizes="72x72"   href="%PUBLIC_URL%/favicons/ios/72.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="%PUBLIC_URL%/favicons/ios/76.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="%PUBLIC_URL%/favicons/ios/114.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="%PUBLIC_URL%/favicons/ios/120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/favicons/ios/144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/favicons/ios/152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/favicons/ios/167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/favicons/ios/180.png" />

    <!-- ── iOS/iPadOS splash screens ────────────────────────────────────── -->
    <!-- ── Android / Chrome ─────────────────────────────────────────────── -->
    <!-- mobile-web-app-capable: enables standalone mode on older Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Microsoft Tiles (Windows / Edge) ─────────────────────────────── -->
    <meta name="msapplication-TileColor" content="#1a1b1e" />
    <meta name="msapplication-TileImage" content="%PUBLIC_URL%/favicons/windows11/Square150x150Logo.scale-200.png" />
    <meta name="msapplication-config" content="none" />

    <!-- ── Open Graph (link previews) ───────────────────────────────────── -->
    <meta property="og:type"         content="website" />
    <meta property="og:title"        content="Elysium – Private Music Player" />
    <meta property="og:description"  content="Privacy-focused music player powered by the Invidious API." />
    <meta property="og:image"        content="%PUBLIC_URL%/favicons/android/android-launchericon-512-512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <!-- ── Twitter Card ─────────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Elysium – Private Music Player" />
    <meta name="twitter:description" content="Privacy-focused music player powered by the Invidious API." />
    <meta name="twitter:image"       content="%PUBLIC_URL%/favicons/android/android-launchericon-512-512.png" />

    <title>Elysium</title>
    <!-- Prevent FOUC: hide body until React mounts (index.tsx adds .loaded to html) -->
    <style>body{visibility:hidden}html.loaded body{visibility:visible}</style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
