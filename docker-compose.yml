# ── Elysium v1.12.3 — Portainer Stack ────────────────────────────────────────
#
#  Paste this into Portainer → Stacks → Add Stack → Web editor
#
#  Images: justxforxdocker/elysium   (PWA + REST server)
#          justxforxdocker/elysium-sync  (WebSocket sync server)
#
#  Access: http://your-server-ip:7771
#
#  Update: pull new images then redeploy the stack
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Main app ────────────────────────────────────────────────────────────────
  elysium:
    image: justxforxdocker/elysium:latest
    container_name: elysium
    restart: unless-stopped
    ports:
      - "7771:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - SYNC_SERVER_URL=http://elysium-sync:3001

      # ── Push notifications (optional) ──────────────────────────────────────
      # Generate keys with:
      #   docker run --rm node:20-alpine npx web-push generate-vapid-keys
      #
      # - VAPID_PUBLIC_KEY=your_public_key_here
      # - VAPID_PRIVATE_KEY=your_private_key_here
      # - VAPID_EMAIL=mailto:you@example.com
      # - BROADCAST_SECRET=change_me_to_a_long_random_secret

      # ── HTTPS / HSTS (only if behind a reverse proxy with SSL) ─────────────
      # - ENABLE_HSTS=true

    depends_on:
      elysium-sync:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - elysium-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.elysium.service=app"
      - "com.elysium.version=1.12.3"

  # ── Real-time sync server ───────────────────────────────────────────────────
  elysium-sync:
    image: justxforxdocker/elysium-sync:latest
    container_name: elysium-sync
    restart: unless-stopped
    # Sync server is NOT exposed directly — all traffic proxied via elysium
    # at /api/live/*. Uncomment only for debugging:
    # ports:
    #   - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - SYNC_TTL_MS=86400000     # 24h — how long device snapshots are kept
      - LOG_LEVEL=info           # debug | info | warn | error
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - elysium-net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 16M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.elysium.service=sync"
      - "com.elysium.version=1.12.3"

networks:
  elysium-net:
    driver: bridge
